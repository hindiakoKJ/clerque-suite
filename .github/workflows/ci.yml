name: CI

on:
  push:
    # SecAudit 2026-05 Infra I3 — branch-name parity. CI was triggered on
    # main/develop while deploy-notify ran on master. Deploys could bypass
    # CI. Now triggered on the actual default branch (master).
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  # ── Type check both apps ────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root

      - name: Build shared-types
        run: npm run build --workspace=packages/shared-types

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Type check — API
        run: npm run check-types --workspace=apps/api

      - name: Type check — Web
        run: npm run check-types --workspace=apps/web

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root

      - name: Build shared-types
        run: npm run build --workspace=packages/shared-types

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Lint — API
        run: npm run lint --workspace=apps/api

  # ── Tests (API) ─────────────────────────────────────────────────────────────
  #
  # SecAudit 2026-05 Testing Gap #1 (Critical) — the 31 spec files in
  # apps/api were never executed in CI. They could all be red and nobody
  # would know; coverage was theatre.
  #
  # This job runs `jest` on every PR + push so the existing tests become
  # a real safety net. Web + Counter have no specs yet so they're skipped;
  # add their jobs here when specs land.
  tests:
    name: Tests (API)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root

      - name: Build shared-types
        run: npm run build --workspace=packages/shared-types

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Run API tests
        run: npm test --workspace=apps/api

  # NOTE: docker-build was removed. Audit I2 — the workflow built `Dockerfile`
  # at repo root but no Dockerfile exists (Railway uses nixpacks via
  # railway.toml). The job failed silently on main and masked real CI
  # signals. Re-add when a real Dockerfile lands.
