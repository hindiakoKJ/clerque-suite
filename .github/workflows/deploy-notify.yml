name: deploy-notify

# After-the-fact visibility gate — D7-02.
#
# We do not have a peer-review gate on master yet (single-engineer team).
# As a compensating control, every push to master fans out to a webhook
# (Slack incoming-webhook, Discord, Mattermost — anything that takes a
# JSON POST). The webhook URL is held in the DEPLOY_NOTIFY_WEBHOOK repo
# secret. If the secret is unset, the job is a no-op so PRs from forks
# don't fail.

on:
  push:
    branches: [master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compose payload
        id: payload
        # `${{ ... }}` interpolation expands BEFORE the script runs, so any
        # parens, quotes, or newlines in the commit message become literal
        # bash tokens and crash the shell. Pass them through `env:` instead
        # so bash sees them as ordinary variable values at runtime.
        env:
          COMMIT_MSG:    ${{ github.event.head_commit.message }}
          AUTHOR_NAME:   ${{ github.event.head_commit.author.name }}
          AUTHOR_EMAIL:  ${{ github.event.head_commit.author.email }}
          COMPARE_URL:   ${{ github.event.compare }}
        run: |
          {
            echo "sha=${GITHUB_SHA}"
            echo "short_sha=${GITHUB_SHA::7}"
            echo "author=${AUTHOR_NAME}"
            echo "author_email=${AUTHOR_EMAIL}"
            subject=$(printf '%s' "${COMMIT_MSG}" | head -n1)
            echo "subject=${subject}"
            echo "compare=${COMPARE_URL}"
          } >> "$GITHUB_OUTPUT"

      - name: Post deploy notification
        if: ${{ env.WEBHOOK != '' }}
        env:
          WEBHOOK: ${{ secrets.DEPLOY_NOTIFY_WEBHOOK }}
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$(jq -nc \
              --arg sha       '${{ steps.payload.outputs.sha }}' \
              --arg short_sha '${{ steps.payload.outputs.short_sha }}' \
              --arg author    '${{ steps.payload.outputs.author }}' \
              --arg email     '${{ steps.payload.outputs.author_email }}' \
              --arg subject   '${{ steps.payload.outputs.subject }}' \
              --arg compare   '${{ steps.payload.outputs.compare }}' \
              --arg repo      '${{ github.repository }}' \
              '{
                 text: ("Deploy to master — " + $short_sha + " by " + $author + ": " + $subject),
                 repo: $repo,
                 sha: $sha,
                 short_sha: $short_sha,
                 author: $author,
                 author_email: $email,
                 subject: $subject,
                 compare_url: $compare
               }')" \
            "$WEBHOOK" || echo "Webhook delivery failed (non-fatal)."

      - name: No-op when webhook not configured
        if: ${{ env.WEBHOOK == '' }}
        env:
          WEBHOOK: ${{ secrets.DEPLOY_NOTIFY_WEBHOOK }}
        run: echo "DEPLOY_NOTIFY_WEBHOOK not set — skipping notification."
