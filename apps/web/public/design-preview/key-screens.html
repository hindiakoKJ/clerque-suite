<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Clerque Counter — Key Screens</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="screens-styles.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  #app { width: 100vw; height: 100vh; }
  /* canvas overrides */
  body, button, input { font-family: "Inter", system-ui, sans-serif; }
</style>
</head>
<body>
<div id="app"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Canvas -->
<script type="text/babel" src="design-canvas.jsx"></script>

<!-- Screens -->
<script type="text/babel" src="screens-tablet.jsx"></script>
<script type="text/babel" src="screens-phone.jsx"></script>

<!-- App -->
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas title="Clerque Counter · Key Screens" subtitle="Deliverable 3 · all screens at native size">
      <DCSection
        id="tablet"
        title="Tablet landscape · 1920×1200"
        subtitle="Samsung Galaxy Tab A8 · canonical surface"
      >
        <DCArtboard id="t-signin" label="01 · Sign in" width={1920} height={1200}>
          <window.SignInTablet />
        </DCArtboard>
        <DCArtboard id="t-pin" label="02 · Cashier PIN" width={1920} height={1200}>
          <window.PinTablet />
        </DCArtboard>
        <DCArtboard id="t-pos" label="03 · POS main" width={1920} height={1200}>
          <window.POSMainTablet />
        </DCArtboard>
        <DCArtboard id="t-mod" label="04 · POS + modifier sheet" width={1920} height={1200}>
          <window.POSModifierSheet />
        </DCArtboard>
        <DCArtboard id="t-tcash" label="05 · Tendering · Cash" width={1920} height={1200}>
          <window.TenderingCash />
        </DCArtboard>
        <DCArtboard id="t-tgcash" label="06 · Tendering · GCash" width={1920} height={1200}>
          <window.TenderingGCash />
        </DCArtboard>
        <DCArtboard id="t-receipt" label="07 · Receipt + print" width={1920} height={1200}>
          <window.ReceiptTablet />
        </DCArtboard>
        <DCArtboard id="t-zread" label="08 · Shift close · Z-read" width={1920} height={1200}>
          <window.ZReadTablet />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="phone"
        title="Phone portrait · 414×900"
        subtitle="Owner spot-check surface · secondary device"
      >
        <DCArtboard id="p-signin" label="09 · Sign in" width={414} height={900}>
          <window.SignInPhone />
        </DCArtboard>
        <DCArtboard id="p-pos" label="10 · POS main" width={414} height={900}>
          <window.POSMainPhone />
        </DCArtboard>
        <DCArtboard id="p-tender" label="11 · Tendering · Cash" width={414} height={900}>
          <window.TenderingPhone />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
