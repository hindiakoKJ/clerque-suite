[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate --schema=packages/db/prisma/schema.prisma && npm run build --workspace=apps/api"

[deploy]
startCommand = "npx prisma db push --schema=packages/db/prisma/schema.prisma --skip-generate --accept-data-loss; node apps/api/dist/main"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
