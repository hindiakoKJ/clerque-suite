[build]
builder = "nixpacks"
# 1. Install workspace deps
# 2. Build @repo/shared-types (API imports its types)
# 3. Generate Prisma client from schema
# 4. Compile NestJS API → apps/api/dist/
# Seed intentionally excluded — it runs in main.ts after DB connection confirmed
buildCommand = "npm install && npm run build --workspace=packages/shared-types && npx prisma generate --schema=packages/db/prisma/schema.prisma && npm run build --workspace=apps/api"

[deploy]
startCommand = "sh start.sh"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
